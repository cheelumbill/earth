<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
  background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1117 100%);
  min-height: 100vh;
  overflow: hidden;
  color: #e6edf3;
}
#canvas-container {
  width: 100%;
  height: 100vh;
  position: relative;
}
#bottom-dock {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  background: rgba(22, 27, 34, 0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(110, 118, 129, 0.3);
  display: flex;
  flex-direction: column;
}
#city-info {
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: #58a6ff;
  transition: color 0.25s ease;
}
#visit-count {
  text-align: center;
  font-size: 0.75rem;
  color: rgba(230, 237, 243, 0.45);
  padding: 6px 12px 10px;
  border-top: 1px solid rgba(110, 118, 129, 0.2);
}
#city-info.empty {
  color: rgba(230, 237, 243, 0.4);
  font-weight: 400;
  font-size: 1rem;
}
.hint {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.85rem;
  color: rgba(230, 237, 243, 0.6);
  z-index: 5;
  pointer-events: none;
}
.city-label {
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
  pointer-events: none;
  user-select: none;
}
#canvas-container .css2d-label {
  pointer-events: none;
}

/* —— 列表 / 配置全屏对话框（原 dialog-demo） —— */
/* 必须在 DOM 中位于 canvas 之后，且 z-index 高于画布，否则会被 WebGL 盖住 */
.btn-open-dlg {
  position: fixed;
  top: max(16px, env(safe-area-inset-top));
  right: max(16px, env(safe-area-inset-right));
  z-index: 100;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 12px;
  background: rgba(30, 35, 48, 0.92);
  backdrop-filter: blur(8px);
  color: #fff;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
  pointer-events: auto;
}
.btn-open-dlg:hover {
  background: rgba(56, 139, 253, 0.35);
  border-color: #58a6ff;
  color: #fff;
}
.btn-open-dlg svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* 本页演示：其它弹层入口，与列表弹层内 onToolbar* 无关 */
.dialog-demo-shortcuts {
  position: fixed;
  top: max(72px, calc(env(safe-area-inset-top) + 56px));
  right: max(16px, env(safe-area-inset-right));
  z-index: 99;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
  max-width: min(100vw - 32px, 320px);
  pointer-events: auto;
}
.dialog-demo-shortcuts .btn-icon-header {
  width: 44px;
  height: 44px;
}

.dialog-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.55);
  display: flex;
  align-items: stretch;
  justify-content: stretch;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
  /* 横屏 / 移动浏览器动态工具栏 */
  min-height: 100vh;
  min-height: 100dvh;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
    env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  box-sizing: border-box;
}
.dialog-overlay.open {
  opacity: 1;
  visibility: visible;
}
/* 列表弹层：浮层容器与 dialog-panel 同级，z-index 高于整块面板（含标题栏）；父级为 fixed，子级 absolute 相对其定位 */
.list-header-float-host {
  position: absolute;
  inset: 0;
  z-index: 100;
  pointer-events: none;
  overflow: visible;
}
/* 浮层 DOM 移到 host 后已不在 th 下，必须用 host 选择器显式显示（否则一直 opacity:0） */
.list-header-float-host .list-th-float {
  opacity: 1;
  visibility: visible;
  pointer-events: none;
}
.list-header-float-host .list-th-float-panel {
  pointer-events: auto;
}
.dialog-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #161b22;
  min-height: 100vh;
  min-height: 100dvh;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}
/* 列表弹层：标题栏与下方列表区无缝隙 */
#dlgList .dialog-header {
  margin-bottom: 0;
}
#dlgList .dialog-body.list-body {
  margin-top: 0;
  border-top: none;
}
.dialog-header {
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 30;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px 12px;
  padding: max(10px, env(safe-area-inset-top, 10px)) 12px 10px;
  padding-left: max(12px, env(safe-area-inset-left, 12px));
  padding-right: max(12px, env(safe-area-inset-right, 12px));
  border-bottom: 1px solid #30363d;
  background: #21262d;
}
/* 左侧：四个工具栏按钮（顺序：左 / 右 / 过滤 / 配置） */
.dialog-header-toolbar {
  grid-column: 1;
  justify-self: start;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  min-width: 0;
}
.dialog-header h1 {
  grid-column: 2;
  justify-self: center;
  text-align: center;
  font-size: clamp(0.95rem, 2.8vw, 1.125rem);
  font-weight: 600;
  color: #f0f6fc;
  min-width: 0;
  max-width: min(100%, 60vw);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
/* 右侧：关闭等 */
.dialog-header-actions {
  grid-column: 3;
  justify-self: end;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
  justify-content: flex-end;
}
.btn-icon-header {
  width: 44px;
  height: 44px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: #8b949e;
  cursor: pointer;
}
.btn-icon-header:hover {
  background: #30363d;
  color: #c9d1d9;
}
.btn-icon-header.btn-hl {
  color: #58a6ff;
}
.btn-icon-header.btn-hl:hover {
  background: rgba(56, 139, 253, 0.15);
  color: #79b8ff;
}
.btn-icon-header.btn-close:hover {
  background: rgba(248, 81, 73, 0.12);
  color: #f85149;
}
.btn-icon-header svg {
  width: 24px;
  height: 24px;
}
.btn-icon-header svg.icon-stroke {
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.btn-icon-header svg.icon-gear {
  fill: currentColor;
  stroke: none;
}

/* 列表区唯一滚动容器：表头 sticky 必须相对它生效。
   切勿在 .table-wrap 上设 overflow-x:auto，否则会变成嵌套滚动层，sticky 失效。 */
.dialog-body.list-body {
  flex: 1;
  min-height: 0;
  overflow: auto;
  overflow-x: auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0;
  padding: 0;
}
.dialog-overlay .table-wrap {
  margin: 0;
  padding: 0;
  overflow: visible;
  max-width: 100%;
  min-width: 0;
}
.dialog-overlay .list-body table {
  width: 100%;
  min-width: 640px;
  margin: 0;
  border-collapse: separate;
  border-spacing: 0;
  font-size: clamp(0.75rem, 2.2vw, 0.875rem);
  table-layout: auto;
}
.dialog-overlay .list-body thead,
.dialog-overlay .list-body thead tr {
  overflow: visible;
}
.dialog-overlay .list-body th,
.dialog-overlay .list-body td {
  padding: 12px 14px;
  text-align: left;
  border-bottom: 1px solid #21262d;
}
.dialog-overlay .list-body thead th.list-th-cell {
  position: sticky;
  top: 0;
  z-index: 20;
  background: #21262d;
  color: #8b949e;
  font-weight: 600;
  box-shadow: 0 1px 0 #30363d;
  vertical-align: bottom;
}
.dialog-overlay .list-body tbody td {
  background: #161b22;
}
/* 斑马纹：单行交替 */
.dialog-overlay .list-body tbody.list-tbody--striped tr:nth-child(odd) td {
  background: rgba(22, 27, 34, 0.98);
}
.dialog-overlay .list-body tbody.list-tbody--striped tr:nth-child(even) td {
  background: rgba(13, 17, 23, 0.95);
}
.dialog-overlay .list-body tbody.list-tbody--striped tr:hover td {
  background: rgba(56, 139, 253, 0.1) !important;
}
.dialog-overlay .list-body th.list-align-left,
.dialog-overlay .list-body td.list-align-left {
  text-align: left;
}
.dialog-overlay .list-body th.list-align-center,
.dialog-overlay .list-body td.list-align-center {
  text-align: center;
}
.dialog-overlay .list-body th.list-align-right,
.dialog-overlay .list-body td.list-align-right {
  text-align: right;
}
.list-th-stack--inline {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.list-th-cell--inline-btns .list-th-label {
  cursor: default;
}
/* 带浮层的列：与其它表头同高，不因浮层撑开行高 */
.dialog-overlay .list-body thead th.list-th-cell--float {
  z-index: 21;
  overflow: visible;
  vertical-align: middle;
}
/* 锚点：浮层绝对定位，不占文档流高度 */
.list-th-stack {
  position: relative;
  display: block;
}
/* 关闭态：占位用 absolute；展开后由 JS 设为 position:fixed + z-index:50，盖过标题栏 */
.list-th-float {
  position: absolute;
  left: 50%;
  bottom: 100%;
  margin-bottom: 6px;
  z-index: 25;
  width: max-content;
  max-width: min(200px, calc(100vw - 32px));
  transform: translateX(-50%) scale(0.96);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition:
    opacity 0.15s ease,
    transform 0.15s ease,
    visibility 0.15s;
}
/* 展开态显示已由 .list-header-float-host .list-th-float 负责（浮层已挂到 host） */
/* 浮层卡片：横向两按钮 */
.list-th-float-panel {
  pointer-events: auto;
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 8px;
  align-items: center;
  justify-content: center;
  padding: 8px 10px;
  background: rgba(22, 27, 34, 0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(88, 166, 255, 0.32);
  border-radius: 12px;
  box-shadow:
    0 14px 40px rgba(0, 0, 0, 0.58),
    0 0 0 1px rgba(0, 0, 0, 0.4),
    0 4px 16px rgba(56, 139, 253, 0.15);
}
.list-th-cell--float .list-th-label {
  display: block;
  position: relative;
  z-index: 1;
  padding: 0;
  line-height: 1.35;
  text-align: center;
  color: #c9d1d9;
  background: transparent;
  cursor: pointer;
}
.list-th-cell:not(.list-th-cell--float) .list-th-label {
  display: block;
  line-height: 1.35;
  color: #c9d1d9;
}
.btn-th-float {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  padding: 0;
  border-radius: 10px;
  border: 1px solid rgba(48, 54, 61, 0.95);
  background: rgba(13, 17, 23, 0.9);
  color: #58a6ff;
  cursor: pointer;
}
.btn-th-float:hover {
  background: rgba(48, 54, 61, 0.95);
  color: #79b8ff;
  border-color: rgba(88, 166, 255, 0.45);
}
.btn-th-float-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}
.dialog-overlay .list-body tr:hover td {
  background: rgba(56, 139, 253, 0.06);
}
.dialog-overlay .list-body tr:last-child td {
  border-bottom: none;
}

.dialog-body.config-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0;
}
.dialog-overlay .config-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #30363d;
  align-content: start;
}
.dialog-overlay .config-grid .config-cell {
  border-radius: 0;
  border: none;
}
@media (max-width: 720px) {
  .dialog-overlay .config-grid {
    grid-template-columns: 1fr;
  }
}
.dialog-overlay .config-cell {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 8px;
  min-height: 56px;
}
.dialog-overlay .config-cell .name {
  flex: 0 0 38%;
  min-width: 0;
  color: #8b949e;
  font-size: 0.8125rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dialog-overlay .config-cell .value {
  flex: 1;
  min-width: 0;
  color: #f0f6fc;
  font-size: 0.875rem;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dialog-overlay .config-cell .btn-cfg {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 10px;
  border: 1px solid #30363d;
  background: #161b22;
  color: #58a6ff;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.dialog-overlay .config-cell .btn-cfg:hover {
  background: #30363d;
}
.dialog-overlay .config-cell .btn-cfg svg.icon-gear,
.dialog-overlay .config-cell .btn-cfg svg.icon-gear path {
  fill: #58a6ff;
  stroke: none;
}
.dialog-overlay .config-cell .btn-cfg:hover svg.icon-gear path {
  fill: #79b8ff;
}
.dialog-overlay .config-cell .btn-cfg svg.icon-gear {
  width: 26px;
  height: 26px;
  display: block;
}
.dialog-overlay .config-cell .btn-cfg svg.icon-stroke {
  width: 22px;
  height: 22px;
  stroke: #58a6ff;
  fill: none;
}
.dialog-overlay .config-cell .btn-cfg:hover svg.icon-stroke {
  stroke: #79b8ff;
}
.dialog-overlay .config-cell .btn-cfg--filter,
.dialog-overlay .config-cell .btn-cfg--chart,
.dialog-overlay .config-cell .btn-cfg--list {
  border-color: #30363d;
}
.dialog-overlay .config-cell .config-cell-action-placeholder {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
}

/* 信息详情对话框（全屏，与列表一致） */
.detail-body {
  flex: 1;
  min-height: 0;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  padding: clamp(10px, 3vw, 16px);
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
}
.detail-text-box {
  min-height: min(200px, 35dvh);
  padding: clamp(12px, 3vw, 16px);
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 10px;
  font-size: clamp(0.8125rem, 2.5vw, 0.9375rem);
  line-height: 1.65;
  color: #e6edf3;
  max-width: 100%;
  box-sizing: border-box;
}
.detail-text-box .c-ok {
  color: #3fb950;
}
.detail-text-box .c-warn {
  color: #d29922;
}
.detail-text-box .c-err {
  color: #f85149;
}
.detail-text-box .c-accent {
  color: #58a6ff;
}
.dialog-footer-btns {
  flex-shrink: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: flex-end;
  padding: 12px max(12px, env(safe-area-inset-right, 12px))
    max(14px, env(safe-area-inset-bottom, 14px))
    max(12px, env(safe-area-inset-left, 12px));
  border-top: 1px solid #30363d;
  background: #21262d;
}
/* 数值弹层底栏：左侧「重置」，右侧「取消」「确定」同一行 */
.dialog-footer-btns--numeric {
  justify-content: space-between;
  align-items: center;
  flex-wrap: nowrap;
  gap: 8px;
}
.dialog-footer-btns-right {
  display: flex;
  flex-wrap: nowrap;
  gap: 10px;
  justify-content: flex-end;
  align-items: center;
}
.dialog-footer-btns--numeric .btn-numeric-reset {
  flex-shrink: 0;
  padding: 8px 12px;
  font-size: 0.8125rem;
  min-height: 36px;
  min-width: auto;
}
.dialog-footer-btns--numeric .dialog-footer-btns-right .btn-dlg {
  min-width: min(88px, 28vw);
  padding: 10px 12px;
}
.btn-dlg {
  min-width: min(96px, 42vw);
  padding: 10px clamp(12px, 4vw, 18px);
  border-radius: 8px;
  font-size: clamp(0.8125rem, 2.4vw, 0.875rem);
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
}
.btn-dlg-secondary {
  background: #21262d;
  border-color: #30363d;
  color: #c9d1d9;
}
.btn-dlg-secondary:hover {
  background: #30363d;
}
.btn-dlg-primary {
  background: #238636;
  border-color: #2ea043;
  color: #fff;
}
.btn-dlg-primary:hover {
  background: #2ea043;
}

/* 报表：固定左右两栏（列表左、图表右），任意宽度不分行 */
.report-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  flex: 1;
  min-height: 0;
  overflow: hidden;
  border-top: 1px solid #30363d;
}
.report-rows {
  min-height: 0;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border-right: 1px solid #30363d;
  background: #161b22;
}
.report-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(4.5rem, auto) minmax(3.5rem, auto) auto;
  gap: clamp(6px, 2vw, 10px);
  align-items: center;
  padding: 10px clamp(8px, 2.5vw, 14px);
  border-bottom: 1px solid #21262d;
  font-size: clamp(0.75rem, 2.1vw, 0.8125rem);
}
.report-row-name {
  color: #c9d1d9;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.report-row-num {
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: #f0f6fc;
}
.report-row-delta {
  text-align: right;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.report-row-delta.up {
  color: #3fb950;
}
.report-row-delta.down {
  color: #f85149;
}
/* 与页面「数据报表」快捷入口一致的图表图标按钮，尺寸适配行高 */
.report-row .btn-report-row-action {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
  padding: 0;
  border-radius: 8px;
}
.report-row .btn-report-row-action svg {
  width: 20px;
  height: 20px;
}
.report-chart-wrap {
  min-height: 0;
  min-width: 0;
  background: #0d1117;
  padding: clamp(8px, 2vw, 12px);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  overflow: hidden;
  gap: 4px;
}
.report-chart-x {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 4px 2px 0;
  font-size: clamp(0.6875rem, 1.8vw, 0.75rem);
  color: rgba(230, 237, 243, 0.55);
  flex-shrink: 0;
}
.report-chart-x .report-chart-x-left,
.report-chart-x .report-chart-x-right {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.report-chart-x-right {
  text-align: right;
}
.report-chart-svg {
  width: 100%;
  height: auto;
  max-height: 100%;
  aspect-ratio: 420 / 240;
  max-width: 100%;
  flex-shrink: 0;
  align-self: center;
}
.report-chart-svg .grid-line {
  stroke: #30363d;
  stroke-width: 1;
}
.report-chart-svg .axis {
  stroke: #484f58;
  stroke-width: 1.5;

/** 每条弧线沿大圆的折线段数（越大越圆滑、顶点越多） */
const ARC_STEPS = 10;
const MARKER_RADIUS = 0.02;
const ARC_COLOR = 0xf59e0b;
/** 弧线像素线宽（Fat Line） */
const ARC_LINE_WIDTH_PX = 3;
const MARKER_COLOR = 0xff6b6b;

const EARTH_TEXTURE_PRIMARY =
  'https://unpkg.com/three-globe@2.24.3/example/img/earth-day.jpg';
const EARTH_TEXTURE_FALLBACK =
  'https://unpkg.com/three-globe@2.24.3/example/img/earth-water.png';

const VISIT_STORAGE_KEY = 'earth_globe_visit_count';

const CAMERA_Z = 2.8;
const ORBIT_MIN = 1.8;
const ORBIT_MAX = 5;

/* --- js/geo.js --- */
function latLonToVector3(lat, lon, radius) {
  const phi = (90 - lat) * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.cos(phi);
  const z = radius * Math.sin(phi) * Math.sin(theta);
  return new THREE.Vector3(x, y, z);
}

function slerpUnit(a, b, t) {
  const dot = THREE.MathUtils.clamp(a.dot(b), -1, 1);
  const angle = Math.acos(dot);
  if (angle < 1e-6) return a.clone();
  if (angle > Math.PI - 1e-6) return a.clone();
  const sa = Math.sin(angle);
  return a
    .clone()
    .multiplyScalar(Math.sin((1 - t) * angle) / sa)
    .add(b.clone().multiplyScalar(Math.sin(t * angle) / sa));
}

/**
 * 大圆弧采样点（两端贴球面、中间略隆起），用于 LineSegments
 * @param steps 每段弧的折线段数，越大越平滑、顶点越多
 */
function getArcPoints(A, B, arcHeight = ARC_HEIGHT, steps = 20) {
  const a = A.clone().normalize();
  const b = B.clone().normalize();
  const dot = THREE.MathUtils.clamp(a.dot(b), -1, 1);
  const angleBetween = Math.acos(dot);
  const pts = [];
  const R0 = GLOBE_RADIUS;

  if (dot >= 0) {
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const r = R0 + arcHeight * Math.sin(Math.PI * t);
      pts.push(slerpUnit(a, b, t).multiplyScalar(r));
    }
  } else {
    const longAngle = 2 * Math.PI - angleBetween;
    let axis = new THREE.Vector3().crossVectors(a, b);
    if (axis.length() < 0.01) {
      axis = new THREE.Vector3().crossVectors(a, new THREE.Vector3(1, 0, 0));
      if (axis.length() < 0.01) {
        axis = new THREE.Vector3().crossVectors(a, new THREE.Vector3(0, 1, 0));
      }
    }
    axis.normalize();
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const r = R0 + arcHeight * Math.sin(Math.PI * t);
      const ang = -t * longAngle;
      pts.push(a.clone().applyAxisAngle(axis, ang).multiplyScalar(r));
    }
  }
  return pts;
}

/**
 * 所有城市对 → 扁平位置数组 [x0,y0,z0, x1,y1,z1, ...]（每 6 个数一条线段），供 LineSegmentsGeometry
 */
function buildMergedArcLinePositions(positions, arcHeight, arcSteps) {
  const pairCount = (positions.length * (positions.length - 1)) / 2;
  const segPerArc = arcSteps;
  const floats = pairCount * segPerArc * 6;
  const arr = new Float32Array(floats);
  let o = 0;
  const p = new THREE.Vector3();

  for (let i = 0; i < positions.length; i++) {
    for (let j = i + 1; j < positions.length; j++) {
      const pts = getArcPoints(positions[i], positions[j], arcHeight, arcSteps);
      for (let k = 0; k < pts.length - 1; k++) {
        p.copy(pts[k]);
        arr[o++] = p.x;
        arr[o++] = p.y;
        arr[o++] = p.z;
        p.copy(pts[k + 1]);
        arr[o++] = p.x;
        arr[o++] = p.y;
        arr[o++] = p.z;
      }
    }
  }

  return arr;
}

/* --- js/globe.js --- */
/**
 * WebGL 地球 + CSS2D 层 + 轨道控制
 */
function createGlobeApp(container) {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = CAMERA_Z;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(labelRenderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = ORBIT_MIN;
  controls.maxDistance = ORBIT_MAX;
  controls.rotateSpeed = 0.5;

  const geometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
  const textureLoader = new THREE.TextureLoader();
  const earthTexture = textureLoader.load(
    EARTH_TEXTURE_PRIMARY,
    undefined,
    undefined,
    () => {
      textureLoader.load(EARTH_TEXTURE_FALLBACK, (tex) => {
        earthTexture.image = tex.image;
        earthTexture.needsUpdate = true;
      });
    }
  );
  const material = new THREE.MeshBasicMaterial({ map: earthTexture });
  const earth = new THREE.Mesh(geometry, material);
  scene.add(earth);

  return {
    scene,
    camera,
    renderer,
    labelRenderer,
    controls,
    earth
  };
}

function resizeGlobeApp(camera, renderer, labelRenderer) {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
}

/* --- js/cityLayer.js --- */
/**
 * 城市：InstancedMesh；弧线：合并 Fat Line（可调像素线宽）
 */
function attachCityLayer(earth, renderer) {
  const markerGeometry = new THREE.SphereGeometry(MARKER_RADIUS, 12, 12);
  const markerMaterial = new THREE.MeshBasicMaterial({ color: MARKER_COLOR });
  const cityPositions = [];
  const labelRefs = [];
  const n = CITIES.length;

  CITIES.forEach((city) => {
    const pos = latLonToVector3(city.lat, city.lon, GLOBE_RADIUS * 1.002);
    cityPositions.push(pos.clone());

    const labelDiv = document.createElement('div');
    labelDiv.className = 'city-label';
    labelDiv.textContent = city.name;
    const labelObj = new CSS2DObject(labelDiv);
    labelObj.position.set(0, 0, 0);
    const cityPivot = new THREE.Object3D();
    cityPivot.position.copy(pos);
    cityPivot.add(labelObj);
    earth.add(cityPivot);
    labelRefs.push({ pivot: cityPivot, element: labelDiv });
  });

  const matrix = new THREE.Matrix4();
  const markerInstanced = new THREE.InstancedMesh(
    markerGeometry,
    markerMaterial,
    n
  );
  for (let i = 0; i < n; i++) {
    matrix.setPosition(cityPositions[i]);
    markerInstanced.setMatrixAt(i, matrix);
  }
  markerInstanced.instanceMatrix.needsUpdate = true;
  markerInstanced.userData.isCityMarkers = true;
  markerInstanced.userData.cityNames = CITIES.map((c) => c.name);
  earth.add(markerInstanced);

  const positionsFlat = buildMergedArcLinePositions(
    cityPositions,
    ARC_HEIGHT,
    ARC_STEPS
  );
  const lineGeom = new LineSegmentsGeometry();
  lineGeom.setPositions(positionsFlat);

  const arcLineMaterial = new LineMaterial({
    color: ARC_COLOR,
    linewidth: ARC_LINE_WIDTH_PX,
    worldUnits: false,
    transparent: true,
    opacity: 0.9,
    depthTest: true,
    resolution: new THREE.Vector2(
      renderer.domElement.width,
      renderer.domElement.height
    )
  });

  const arcLines = new LineSegments2(lineGeom, arcLineMaterial);
  earth.add(arcLines);

  return { labelRefs, arcLineMaterial };
}

/* --- js/interactions.js --- */
function bindCityPick(container, earth, camera, cityInfoEl) {
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onPointerMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  }

  function onClick() {
    raycaster.setFromCamera(mouse, camera);
    const pickables = [];
    earth.children.forEach((child) => {
      if (child.userData && child.userData.isCityMarkers) {
        pickables.push(child);
      }
      if (child.userData && child.userData.cityName) {
        pickables.push(child);
      }
    });
    const hits = raycaster.intersectObjects(pickables, true);
    if (hits.length > 0) {
      const hit = hits[0];
      const obj = hit.object;
      let name;
      if (obj.userData.isCityMarkers && hit.instanceId != null) {
        name = obj.userData.cityNames[hit.instanceId];
      } else if (obj.userData.cityName) {
        name = obj.userData.cityName;
      }
      if (name) {
        cityInfoEl.textContent = name;
        cityInfoEl.classList.remove('empty');
      }
    }
  }

  container.addEventListener('mousemove', onPointerMove);
  container.addEventListener('click', onClick);
}

function updateLabelVisibility(earth, camera, labelRefs) {
  earth.updateMatrixWorld(true);
  const cameraDir = new THREE.Vector3().copy(camera.position).normalize();
  const worldPos = new THREE.Vector3();
  labelRefs.forEach((ref) => {
    ref.pivot.getWorldPosition(worldPos);
    const dot = worldPos.clone().normalize().dot(cameraDir);
    ref.element.style.visibility = dot > 0 ? 'visible' : 'hidden';
  });
}

/* --- js/visitCount.js --- */
function initVisitCount(element) {
  let n = parseInt(localStorage.getItem(VISIT_STORAGE_KEY) || '0', 10);
  if (Number.isNaN(n)) n = 0;
  n += 1;
  localStorage.setItem(VISIT_STORAGE_KEY, String(n));
  element.textContent = '本页已累计打开 ' + n + ' 次';
}

/* --- js/main.js --- */
const container = document.getElementById('canvas-container');
const cityInfoEl = document.getElementById('city-info');
const visitEl = document.getElementById('visit-count');

initVisitCount(visitEl);

const { scene, camera, renderer, labelRenderer, controls, earth } =
  createGlobeApp(container);
const { labelRefs, arcLineMaterial } = attachCityLayer(earth, renderer);

bindCityPick(container, earth, camera, cityInfoEl);

function syncArcLineResolution() {
  if (arcLineMaterial) {
    arcLineMaterial.resolution.set(
      renderer.domElement.width,
      renderer.domElement.height
    );
    arcLineMaterial.needsUpdate = true;
  }
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateLabelVisibility(earth, camera, labelRefs);
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  resizeGlobeApp(camera, renderer, labelRenderer);
  syncArcLineResolution();
});

 * 全屏弹层栈：按 id 唯一；同 id 再次打开会置顶；z-index 随栈升高。

(function () {
  var BASE_Z = 1000;
  var STEP_Z = 10;
  var stack = [];

  function applyZIndices() {
    stack.forEach(function (entry, idx) {
      if (entry.el && entry.el.style) {
        entry.el.style.zIndex = String(BASE_Z + (idx + 1) * STEP_Z);
      }
    });
  }

  function findIndex(id) {
    for (var i = 0; i < stack.length; i++) {
      if (stack[i].id === id) return i;
    }
    return -1;
  }

  function push(entry) {
    var id = entry.id;
    if (!id) throw new Error('DialogStack.push: id required');
    var i = findIndex(id);
    if (i >= 0) {
      stack.splice(i, 1);
    }
    stack.push(entry);
    applyZIndices();
  }

  function bringToTop(id) {
    var i = findIndex(id);
    if (i < 0) return false;
    var entry = stack.splice(i, 1)[0];
    stack.push(entry);
    applyZIndices();
    return true;
  }

  function remove(id) {
    var i = findIndex(id);
    if (i < 0) return null;
    return stack.splice(i, 1)[0];
  }

  function get(id) {
    var i = findIndex(id);
    return i >= 0 ? stack[i] : null;
  }

  function snapshot() {
    return stack.slice();
  }

  function countKind(kind) {
    var n = 0;
    stack.forEach(function (e) {
      if (e.kind === kind) n += 1;
    });
    return n;
  }

  window.DialogStack = {
    push: push,
    bringToTop: bringToTop,
    remove: remove,
    get: get,
    snapshot: snapshot,
    countKind: countKind,
    applyZIndices: applyZIndices,
    BASE_Z: BASE_Z,
    STEP_Z: STEP_Z
  };
})();

    var gap = 6;
    var top = rect.top - h - gap;
    if (top < pad) top = pad;
    shell.style.top = top + 'px';
    var shellRect = shell.getBoundingClientRect();
    var m = 8;
    if (shellRect.right > window.innerWidth - m) {

      shell.style.left = rect.left + rect.width / 2 + delta + 'px';

  function onDlgListDelegatedClick(e) {
    var overlay = e.target.closest(
      '.dialog-overlay[data-dialog-kind="list"][data-dialog-id]'
    );
    if (!overlay || !overlay.classList.contains('open')) return;
    if (!overlay.contains(e.target)) return;

    var dialogId = overlay.getAttribute('data-dialog-id');
    var entry = getEntry(dialogId);
    var cb = entry && entry.callbacks ? entry.callbacks : {};

    var headers = overlay._listHeaders || D.listHeadersDemo();

    var btnFloat = e.target.closest('.btn-th-float');
    if (btnFloat && overlay.contains(btnFloat)) {
      e.stopPropagation();
      var c = parseInt(btnFloat.getAttribute('data-col'), 10);
      var action = btnFloat.getAttribute('data-action');
      var h = headers[c];
      var payload = { col: c, header: headerText(h) };
      if (action === 'filter' && h && typeof h.onFilter === 'function') {
        h.onFilter(payload);
      } else if (action === 'sort' && h && typeof h.onSort === 'function') {
        h.onSort(payload);
      }
      closeListHeaderFloatsFor(overlay);
      return;
    }

    if (e.target.closest('.list-th-float-panel')) return;

    var thF = e.target.closest('th.list-th-cell--float');
    if (thF) {
      var wasOpen = thF.classList.contains('is-float-open');
      closeListHeaderFloatsFor(overlay);
      if (!wasOpen) openListHeaderFloat(overlay, thF);
      return;
    }

    var thInline = e.target.closest('th.list-th-cell--inline-btns');
    if (thInline && !e.target.closest('.btn-th-float')) {
      closeListHeaderFloatsFor(overlay);
      var colI = parseInt(thInline.getAttribute('data-col'), 10);
      var hi = headers[colI];
      if (typeof cb.onHeaderClick === 'function') {
        cb.onHeaderClick({ col: colI, header: headerText(hi) });
      }
      return;
    }

    var th = e.target.closest('th.list-th-cell');
    if (th) {
      closeListHeaderFloatsFor(overlay);
      var col = parseInt(th.getAttribute('data-col'), 10);
      var hh = headers[col];
      if (typeof cb.onHeaderClick === 'function') {
        cb.onHeaderClick({ col: col, header: headerText(hh) });
      }
      return;
    }

    var tr = e.target.closest('tbody tr[data-row-idx]');
    if (tr) {
      closeListHeaderFloatsFor(overlay);
      var idx = parseInt(tr.getAttribute('data-row-idx'), 10);
      var row = (overlay._dialogListRows || [])[idx];
      if (row && typeof cb.onRowClick === 'function') {
        cb.onRowClick({ row: row, index: idx });
      }
      return;
    }

    closeListHeaderFloatsFor(overlay);
  }

  function drawReportChart(overlay, seriesA, seriesB, xAxisStart, xAxisEnd) {
    var svg = overlay.querySelector('.js-report-chart');
    if (!svg) return;
    var W = 420;
    var H = 240;
    var padL = 44;
    var padR = 16;
    var padT = 28;
    var padB = 36;
    var gw = W - padL - padR;
    var gh = H - padT - padB;
    var all = seriesA.concat(seriesB);
    var minV = Math.min.apply(null, all);
    var maxV = Math.max.apply(null, all);
    var padY = (maxV - minV) * 0.12 || 4;
    minV -= padY;
    maxV += padY;
    function xAt(i, n) {
      return padL + (gw * i) / (n - 1);
    }
    function yAt(v) {
      return padT + gh * (1 - (v - minV) / (maxV - minV || 1));
    }
    var n = seriesA.length;
    var pathA = seriesA
      .map(function (v, i) {
        return (i === 0 ? 'M' : 'L') + xAt(i, n).toFixed(1) + ' ' + yAt(v).toFixed(1);
      })
      .join(' ');
    var pathB = seriesB
      .map(function (v, i) {
        return (i === 0 ? 'M' : 'L') + xAt(i, n).toFixed(1) + ' ' + yAt(v).toFixed(1);
      })
      .join('');

    var parts = [];
    parts.push(
      '<line class="axis" x1="' +
        padL +
        '" y1="' +
        (H - padB) +
        '" x2="' +
        (W - padR) +
        '" y2="' +
        (H - padB) +
        '"/>'
    );
    parts.push(
      '<line class="axis" x1="' +
        padL +
        '" y1="' +
        padT +
        '" x2="' +
        padL +
        '" y2="' +
        (H - padB) +
        '"/>'
    );
    for (var g = 0; g <= 4; g++) {
      var yy = padT + (gh * g) / 4;
      parts.push(
        '<line class="grid-line" x1="' +
          padL +
          '" y1="' +
          yy +
          '" x2="' +
          (W - padR) +
          '" y2="' +
          yy +
          '"/>'
      );
    }
    parts.push('<path class="line-a" d="' + pathA + '"/>');
    parts.push('<path class="line-b" d="' + pathB + '"/>');
    parts.push(
      '<g class="legend" transform="translate(' +
        (padL + 4) +
        ',' +
        12 +
        ')">' +
        '<line x1="0" y1="0" x2="18" y2="0" class="line-a" stroke-width="3"/>' +
        '<text x="24" y="4">系列 A</text>' +
        '<line x1="100" y1="0" x2="118" y2="0" class="line-b" stroke-width="3"/>' +
        '<text x="124" y="4">系列 B</text>' +
        '</g>'
    );
    svg.innerHTML = parts.join('');
    var xs =
      xAxisStart !== undefined && xAxisStart !== null
        ? xAxisStart
        : D.reportXAxisStart;
    var xe =
      xAxisEnd !== undefined && xAxisEnd !== null ? xAxisEnd : D.reportXAxisEnd;
    setReportXAxisLabels(overlay, xs, xe);
    overlay.setAttribute('data-report-x-start', String(xs));
    overlay.setAttribute('data-report-x-end', String(xe));
  }

  /**
   * 仅重绘指定 id 报表弹层右侧折线图与横轴文字；左侧行列表与滚动位置不变。
   * 若栈中无该 id 或类型不是 report，则无操作。
   * seriesA / seriesB 须为与当前点数一致的长度；横轴起止省略时沿用该弹层上次绘制时的标签。
   */
  function updateReportChart(id, seriesA, seriesB, xAxisStart, xAxisEnd) {
    if (id == null || id === '') return;
    var entry = DS.get(String(id));
    if (!entry || entry.kind !== 'report' || !entry.el) return;
    if (!Array.isArray(seriesA) || !Array.isArray(seriesB)) return;
    var ov = entry.el;
    var xa =
      xAxisStart !== undefined && xAxisStart !== null
        ? xAxisStart
        : ov.getAttribute('data-report-x-start');
    var xe =
      xAxisEnd !== undefined && xAxisEnd !== null
        ? xAxisEnd
        : ov.getAttribute('data-report-x-end');
    drawReportChart(ov, seriesA, seriesB, xa, xe);
  }

  function clampInRange(v, min, max) {
    var n = typeof v === 'number' ? v : parseFloat(String(v), 10);
    if (isNaN(n)) n = min;
    return Math.max(min, Math.min(max, n));
  }

  function findNumericSingleElements(fieldsRoot, fid) {
    if (!fieldsRoot || !fid) return { num: null, rng: null };
    var nums = fieldsRoot.querySelectorAll('.js-input-numeric');
    var rngs = fieldsRoot.querySelectorAll('.js-input-numeric-range');
    var num = null;
    var rng = null;
    var i;
    for (i = 0; i < nums.length; i++) {
      if (
        nums[i].getAttribute('data-field-id') === fid &&
        !nums[i].getAttribute('data-range-part')
      ) {
        num = nums[i];
        break;
      }
    }
    for (i = 0; i < rngs.length; i++) {
      if (
        rngs[i].getAttribute('data-field-id') === fid &&
        !rngs[i].getAttribute('data-range-part')
      ) {
        rng = rngs[i];
        break;
      }
    }
    return { num: num, rng: rng };
  }

  function findRangeElements(fieldsRoot, fid) {
    if (!fieldsRoot || !fid) {
      return {
        lowNum: null,
        highNum: null,
        lowRng: null,
        highRng: null
      };
    }
    var nums = fieldsRoot.querySelectorAll('.js-input-numeric');
    var rngs = fieldsRoot.querySelectorAll('.js-input-numeric-range');
    var lowNum = null;
    var highNum = null;
    var lowRng = null;
    var highRng = null;
    var i;
    for (i = 0; i < nums.length; i++) {
      if (nums[i].getAttribute('data-field-id') !== fid) continue;
      if (nums[i].getAttribute('data-range-part') === 'low') lowNum = nums[i];
      if (nums[i].getAttribute('data-range-part') === 'high') highNum = nums[i];
    }
    for (i = 0; i < rngs.length; i++) {
      if (rngs[i].getAttribute('data-field-id') !== fid) continue;
      if (rngs[i].getAttribute('data-range-part') === 'low') lowRng = rngs[i];
      if (rngs[i].getAttribute('data-range-part') === 'high') highRng = rngs[i];
    }
    return { lowNum: lowNum, highNum: highNum, lowRng: lowRng, highRng: highRng };
  }

  function pctInSpan(v, mn, mx) {
    var span = mx - mn;
    if (span <= 0) return 50;
    return Math.max(0, Math.min(100, ((v - mn) / span) * 100));
  }

  function normalizeNumericField(f, i) {
    var id =
      f && f.id != null && String(f.id).length
        ? String(f.id)
        : 'field-' + i;
    var name = f && f.name != null ? String(f.name) : id;
    var mn = f && f.min != null && !isNaN(Number(f.min)) ? Number(f.min) : 0;
    var mx = f && f.max != null && !isNaN(Number(f.max)) ? Number(f.max) : 100;
    if (isNaN(mn)) mn = 0;
    if (isNaN(mx)) mx = 100;
    if (mx < mn) {
      var t = mx;
      mx = mn;
      mn = t;
    }
    var step = f && f.step != null && !isNaN(Number(f.step)) ? Number(f.step) : 1;
    if (step <= 0) step = 1;
    var renderLabel = typeof f.renderLabel === 'function' ? f.renderLabel : null;
    var isRange = f && f.type === 'range';

    if (isRange) {
      var low;
      var high;
      if (f.value != null && typeof f.value === 'object') {
        low = Number(f.value.low);
        high = Number(f.value.high);
      } else {
        low = mn + (mx - mn) * 0.25;
        high = mn + (mx - mn) * 0.75;
      }
      if (isNaN(low)) low = mn + (mx - mn) * 0.25;
      if (isNaN(high)) high = mn + (mx - mn) * 0.75;
      low = clampInRange(low, mn, mx);
      high = clampInRange(high, mn, mx);
      if (low > high) {
        var s = low;
        low = high;
        high = s;
      }
      var dLow = low;
      var dHigh = high;
      if (f.defaultValue != null && typeof f.defaultValue === 'object') {
        dLow = clampInRange(Number(f.defaultValue.low), mn, mx);
        dHigh = clampInRange(Number(f.defaultValue.high), mn, mx);
        if (isNaN(dLow)) dLow = low;
        if (isNaN(dHigh)) dHigh = high;
      }
      if (dLow > dHigh) {
        var s2 = dLow;
        dLow = dHigh;
        dHigh = s2;
      }
      return {
        id: id,
        name: name,
        fieldKind: 'range',
        min: mn,
        max: mx,
        step: step,
        value: { low: low, high: high },
        defaultValue: { low: dLow, high: dHigh },
        renderLabel: renderLabel
      };
    }

    var defVal = (mn + mx) / 2;
    var val =
      f && f.value != null && !isNaN(Number(f.value)) ? Number(f.value) : defVal;
    val = clampInRange(val, mn, mx);
    var defDV = val;
    if (f && f.defaultValue != null && !isNaN(Number(f.defaultValue))) {
      defDV = clampInRange(Number(f.defaultValue), mn, mx);
    }
    return {
      id: id,
      name: name,
      fieldKind: 'single',
      min: mn,
      max: mx,
      step: step,
      value: val,
      defaultValue: defDV,
      renderLabel: renderLabel
    };
  }

  function buildNumericRenderers(fieldsNorm) {
    var o = {};
    fieldsNorm.forEach(function (f) {
      if (typeof f.renderLabel === 'function') {
        o[f.id] = f.renderLabel;
      }
    });
    return o;
  }

  function numStepAttr(step) {
    if (step % 1 === 0) return String(step);
    return String(step);
  }

  function updateNumericLabels(fieldsRoot, overlay) {
    if (!fieldsRoot || !overlay) return;
    var dlgId = overlay.getAttribute('data-dialog-id');
    var entry = dlgId ? DS.get(dlgId) : null;
    var fns = entry && entry.numericRenderers ? entry.numericRenderers : {};
    var nodes = fieldsRoot.querySelectorAll('.js-numeric-delta');
    Array.prototype.forEach.call(nodes, function (el) {
      var fid = el.getAttribute('data-field-id');
      if (!fid) return;
      var fn = fns[fid];
      if (typeof fn !== 'function') {
        el.textContent = '';
        el.hidden = true;
        el.removeAttribute('title');
        return;
      }
      var row = el.closest('.ui-numeric-field--row');
      if (!row) return;
      var fk = row.getAttribute('data-field-kind') || 'single';
      var mn = parseFloat(row.getAttribute('data-min'), 10);
      var mx = parseFloat(row.getAttribute('data-max'), 10);
      if (isNaN(mn)) mn = 0;
      if (isNaN(mx)) mx = 100;
      var ctx = {
        dialogId: dlgId,
        fieldId: fid,
        kind: fk === 'range' ? 'range' : 'single',
        min: mn,
        max: mx
      };
      if (fk === 'range') {
        var R = findRangeElements(fieldsRoot, fid);
        if (!R.lowNum || !R.highNum) return;
        ctx.current = {
          low: parseFloat(String(R.lowNum.value), 10),
          high: parseFloat(String(R.highNum.value), 10)
        };
        ctx.defaultValue = {
          low: parseFloat(String(R.lowNum.getAttribute('data-default-value')), 10),
          high: parseFloat(String(R.highNum.getAttribute('data-default-value')), 10)
        };
      } else {
        var S = findNumericSingleElements(fieldsRoot, fid);
        if (!S.num) return;
        ctx.current = parseFloat(String(S.num.value), 10);
        ctx.defaultValue = parseFloat(
          String(S.num.getAttribute('data-default-value')),
          10
        );
      }
      var text;
      try {
        text = fn(ctx);
      } catch (err) {
        console.warn('renderLabel', fid, err);
        text = '';
      }
      text = text == null || text === '' ? '' : String(text);
      el.textContent = text;
      el.hidden = !text;
      el.classList.remove('is-up', 'is-down');
      if (text) {
        el.setAttribute('title', text);
      } else {
        el.removeAttribute('title');
      }
    });
  }

  function syncRangeInputs(fields, fid) {
    var R = findRangeElements(fields, fid);
    if (!R.lowNum || !R.highNum || !R.lowRng || !R.highRng) return;
    var mn = parseFloat(R.lowNum.getAttribute('min'), 10);
    var mx = parseFloat(R.lowNum.getAttribute('max'), 10);
    if (isNaN(mn)) mn = 0;
    if (isNaN(mx)) mx = 100;
    var low = clampInRange(parseFloat(String(R.lowNum.value), 10), mn, mx);
    var high = clampInRange(parseFloat(String(R.highNum.value), 10), mn, mx);
    if (low > high) {
      low = high;
    }
    R.lowNum.value = String(low);
    R.highNum.value = String(high);
    R.lowRng.value = String(low);
    R.highRng.value = String(high);
  }

  function renderNumericFields(overlay, fields) {
    var host = overlay.querySelector('.js-numeric-fields');
    if (!host) return;
    host.innerHTML = fields
      .map(function (f, idx) {
        var fid = escapeHtml(f.id);
        var name = escapeHtml(f.name);
        var mn = f.min;
        var mx = f.max;
        var st = numStepAttr(f.step);
        var lid = 'nf-' + idx;
        var span = mx - mn;
        var metaHint =

        if (f.fieldKind === 'range') {
          var low = f.value.low;

          return (

            '" min="' +
            mn +
            '" max="' +
            mx +
            '" step="' +
            st +
            '" value="' +
            escapeHtml(ivl) +
            '" inputmode="decimal" />' +
            '<input type="number" id="' +
            lid +
            '-hi" class="ui-input-number js-input-numeric" data-field-id="' +
            fid +
            '" data-range-part="high" data-default-value="' +
            escapeHtml(String(dh)) +
            '" min="' +
            mn +
            '" max="' +
            mx +
            '" step="' +
            st +
            '" value="' +
            escapeHtml(ivh) +
            '" inputmode="decimal" />' +
            '</div>' +
            '<div class="ui-numeric-range-wrap ui-numeric-range-dual">' +
            '<input type="range" class="ui-input-range ui-input-range--numeric js-input-numeric-range js-input-range-high" data-field-id="' +
            fid +
            '" data-range-part="high" min="' +
            mn +
            '" max="' +
            mx +
            '" step="' +
            st +
            '" value="' +
            escapeHtml(ivh) +
            '" aria-label="' +
            name +
            '（上界）" />' +
            '<input type="range" class="ui-input-range ui-input-range--numeric js-input-numeric-range js-input-range-low" data-field-id="' +
            fid +
            '" data-range-part="low" min="' +
            mn +
            '" max="' +
            mx +

            metaHint +
            '</div>' +

          );
        }

        var iv = String(f.value);
        var defv = f.defaultValue;
        var originPct = pctInSpan(defv, mn, mx);
        return (
          '<div class="ui-field-group ui-numeric-field ui-numeric-field--row" data-field-kind="single" data-min="' +
          mn +
          '" data-max="' +
          mx +
          '">' +
          '<label class="ui-field-label" for="' +
          lid +
          '">' +
          name +
          '</label>' +
          '<div class="ui-numeric-row">' +
          '<input type="number" id="' +
          lid +
          '" class="ui-input-number js-input-numeric" data-field-id="' +
          fid +
          '" data-default-value="' +
          escapeHtml(String(defv)) +
          '" min="' +
          mn +
          '" max="' +
          mx +
          '" step="' +
          st +
          '" value="' +
          escapeHtml(iv) +
          '" inputmode="decimal" />' +
          '<div class="ui-numeric-range-wrap">' +
          '<input type="range" class="ui-input-range ui-input-range--numeric js-input-numeric-range" data-field-id="' +
          fid +
          '" min="' +
          mn +
          '" max="' +
          mx +
          '" step="' +
          st +
          '" value="' +
          escapeHtml(iv) +
          '" aria-label="' +
          name +
          '（滑杆）" />' +
          '<span class="ui-range-origin-mark" style="left:' +
          originPct.toFixed(2) +

          '<div class="ui-numeric-meta">' +
          metaHint +

      .join('');
    updateNumericLabels(host, overlay);
  }

  function wireNumericOverlay(overlay) {
    if (overlay.dataset.numericInputWired === '1') return;
    overlay.dataset.numericInputWired = '1';

    overlay.addEventListener('input', function (e) {
      var t = e.target;
      if (!t || !t.getAttribute || !t.classList) return;
      if (
        !t.classList.contains('js-input-numeric') &&
        !t.classList.contains('js-input-numeric-range')
      ) {
        return;
      }
      var fid = t.getAttribute('data-field-id');
      if (!fid) return;
      var fields = overlay.querySelector('.js-numeric-fields');
      if (!fields) return;
      var row = t.closest('.ui-numeric-field--row');
      var fk = row && row.getAttribute('data-field-kind');

      if (fk === 'range') {
        var R = findRangeElements(fields, fid);
        if (!R.lowNum || !R.highNum || !R.lowRng || !R.highRng) return;
        var mn = parseFloat(R.lowNum.getAttribute('min'), 10);
        var mx = parseFloat(R.lowNum.getAttribute('max'), 10);
        if (isNaN(mn)) mn = 0;
        if (isNaN(mx)) mx = 100;
        var part = t.getAttribute('data-range-part');
        if (t === R.lowRng) {
          R.lowNum.value = R.lowRng.value;
        } else if (t === R.highRng) {
          R.highNum.value = R.highRng.value;
        } else if (t === R.lowNum) {
          var nl = clampInRange(parseFloat(String(R.lowNum.value), 10), mn, mx);
          R.lowNum.value = String(nl);
          R.lowRng.value = R.lowNum.value;
        } else if (t === R.highNum) {
          var nh = clampInRange(parseFloat(String(R.highNum.value), 10), mn, mx);
          R.highNum.value = String(nh);
          R.highRng.value = R.highNum.value;
        }
        var low = clampInRange(parseFloat(String(R.lowNum.value), 10), mn, mx);
        var high = clampInRange(parseFloat(String(R.highNum.value), 10), mn, mx);
        if (low > high) {
          if (part === 'low' || t === R.lowRng || t === R.lowNum) {
            high = low;
            R.highNum.value = String(high);
            R.highRng.value = String(high);
          } else {
            low = high;
            R.lowNum.value = String(low);
            R.lowRng.value = String(low);
          }
        }
        R.lowNum.value = String(low);
        R.highNum.value = String(high);
        R.lowRng.value = String(low);
        R.highRng.value = String(high);
        updateNumericLabels(fields, overlay);
        return;
      }

      var pair = findNumericSingleElements(fields, fid);
      var num = pair.num;
      var rng = pair.rng;
      if (!num || !rng) return;
      mn = parseFloat(num.getAttribute('min'));
      mx = parseFloat(num.getAttribute('max'));
      if (isNaN(mn)) mn = 0;
      if (isNaN(mx)) mx = 100;
      if (t === rng) {
        num.value = rng.value;
      } else {
        var n = clampInRange(parseFloat(String(num.value)), mn, mx);
        rng.value = String(n);
        num.value = rng.value;
      }
      updateNumericLabels(fields, overlay);
    });

    overlay.addEventListener('click', function (e) {
      var btn = e.target.closest && e.target.closest('.js-numeric-reset');
      if (!btn || !overlay.contains(btn)) return;
      e.preventDefault();
      var fields = overlay.querySelector('.js-numeric-fields');
      if (!fields) return;
      var nums = fields.querySelectorAll('.js-input-numeric');
      Array.prototype.forEach.call(nums, function (num) {
        var def = num.getAttribute('data-default-value');
        var fid = num.getAttribute('data-field-id');
        var part = num.getAttribute('data-range-part');
        if (part === 'low') {
          var RL = findRangeElements(fields, fid);
          if (RL.lowRng && RL.lowNum) {
            RL.lowNum.value = def;
            RL.lowRng.value = def;
          }
        } else if (part === 'high') {
          var RH = findRangeElements(fields, fid);
          if (RH.highRng && RH.highNum) {
            RH.highNum.value = def;
            RH.highRng.value = def;
          }
        } else {
          var pair2 = findNumericSingleElements(fields, fid);
          if (pair2.rng && pair2.num) {
            pair2.num.value = def;
            pair2.rng.value = def;
          }
        }
      });
      var seenRangeFid = {};
      Array.prototype.forEach.call(
        fields.querySelectorAll('.ui-numeric-field--row[data-field-kind="range"]'),
        function (row) {
          var lo = row.querySelector('.js-input-numeric[data-range-part="low"]');
          if (!lo) return;
          var rfid = lo.getAttribute('data-field-id');
          if (rfid && !seenRangeFid[rfid]) {
            seenRangeFid[rfid] = true;
            syncRangeInputs(fields, rfid);
          }
        }
      );
      updateNumericLabels(fields, overlay);
    });
  }

  function openList(id, rows, headers, callbacks) {
    callbacks = mergeCallbacks(
      mergeCallbacks(defaultBaseCallbacks(), {
        onRowClick: noop,
        onHeaderClick: noop
      }),
      callbacks || {}
    );

    var existing = DS.get(id);
    if (existing && existing.kind === 'list') {
      DS.bringToTop(id);
      existing.callbacks = callbacks;
      renderList(existing.el, rows, headers, callbacks);
      syncToolbarButtonsFromCallbacks(existing.el, callbacks);
      showOverlay(existing.el);
      var lb0 = existing.el.querySelector('.list-body');
      if (lb0) lb0.scrollTop = 0;
      attachListBodyScroll(existing.el);
      initListGlobalListenersOnce();
      return;
    }

    var el = resolveOverlayElement('list');
    el.setAttribute('data-dialog-id', id);
    DS.push({ id: id, kind: 'list', el: el, callbacks: callbacks });
    renderList(el, rows, headers, callbacks);
    syncToolbarButtonsFromCallbacks(el, callbacks);
    showOverlay(el);
    var lb = el.querySelector('.list-body');
    if (lb) lb.scrollTop = 0;
    attachListBodyScroll(el);
    initListGlobalListenersOnce();
  }

  function openReport(id, rows, seriesA, seriesB, xAxisStart, xAxisEnd, callbacks) {
    callbacks = mergeCallbacks(
      mergeCallbacks(defaultBaseCallbacks(), {
        onReportRowAction: noop
      }),
      callbacks || {}
    );

    var rRows = rows === undefined || rows === null ? D.reportRows : rows;
    var sa = seriesA === undefined || seriesA === null ? D.reportSeriesA : seriesA;
    var sb = seriesB === undefined || seriesB === null ? D.reportSeriesB : seriesB;
    var xa =
      xAxisStart === undefined || xAxisStart === null ? D.reportXAxisStart : xAxisStart;
    var xe = xAxisEnd === undefined || xAxisEnd === null ? D.reportXAxisEnd : xAxisEnd;

    var existing = DS.get(id);
    if (existing && existing.kind === 'report') {
      DS.bringToTop(id);
      existing.callbacks = callbacks;
      renderReportRows(existing.el, rRows, callbacks);
      drawReportChart(existing.el, sa, sb, xa, xe);
      syncToolbarButtonsFromCallbacks(existing.el, callbacks);
      showOverlay(existing.el);
      return;
    }

    var el = resolveOverlayElement('report');
    el.setAttribute('data-dialog-id', id);
    DS.push({ id: id, kind: 'report', el: el, callbacks: callbacks });
    renderReportRows(el, rRows, callbacks);
    drawReportChart(el, sa, sb, xa, xe);
    syncToolbarButtonsFromCallbacks(el, callbacks);
    showOverlay(el);
  }

  function openConfig(id, rows, callbacks) {
    callbacks = mergeCallbacks(
      mergeCallbacks(defaultBaseCallbacks(), {
        onConfigItem: noop
      }),
      callbacks || {}
    );

    var cfgRows = rows === undefined || rows === null ? D.cfgRows : rows;

    var existing = DS.get(id);
    if (existing && existing.kind === 'config') {
      DS.bringToTop(id);
      existing.callbacks = callbacks;
      renderConfig(existing.el, cfgRows, callbacks);
      syncToolbarButtonsFromCallbacks(existing.el, callbacks);
      showOverlay(existing.el);
      var body = existing.el.querySelector('.config-body');
      if (body) body.scrollTop = 0;
      return;
    }

    var el = resolveOverlayElement('config');
    el.setAttribute('data-dialog-id', id);
    DS.push({ id: id, kind: 'config', el: el, callbacks: callbacks });
    renderConfig(el, cfgRows, callbacks);
    syncToolbarButtonsFromCallbacks(el, callbacks);
    showOverlay(el);
    var cfgBody = el.querySelector('.config-body');
    if (cfgBody) cfgBody.scrollTop = 0;
  }

  /**
   * 数值输入：多字段模式 `openNumeric(id, fields[], callbacks)`，每项含 id、name、value、min、max、step；
   * 兼容旧版 `openNumeric(id, value, min, max, callbacks)` 单字段（id 为「value」）。
   */
  function openNumeric(id, arg2, arg3, arg4, arg5) {
    var userCallbacks = {};
    var fieldsNorm = [];

    if (Array.isArray(arg2)) {
      userCallbacks = arg3 || {};
      if (!arg2.length) {
        fieldsNorm = [normalizeNumericField({}, 0)];
      } else {
        fieldsNorm = arg2.map(function (f, i) {
          return normalizeNumericField(f, i);
        });
      }
    } else {
      userCallbacks = (arg5 !== undefined && arg5 !== null ? arg5 : {}) || {};
      fieldsNorm = [
        normalizeNumericField(
          {
            id: 'value',
            name: '当前数值',
            value: arg2,
            min: arg3,
            max: arg4
          },
          0
        )
      ];
    }

    var callbacks = mergeCallbacks(defaultBaseCallbacks(), userCallbacks);
    var numericRenderers = buildNumericRenderers(fieldsNorm);

    var existing = DS.get(id);
    if (existing && existing.kind === 'numeric') {
      DS.bringToTop(id);
      existing.callbacks = callbacks;
      existing.numericRenderers = numericRenderers;
      renderNumericFields(existing.el, fieldsNorm);
      wireNumericOverlay(existing.el);
      syncToolbarButtonsFromCallbacks(existing.el, callbacks);
      showOverlay(existing.el);
      return;
    }

    var el = resolveOverlayElement('numeric');
    el.setAttribute('data-dialog-id', id);
    DS.push({
      id: id,
      kind: 'numeric',
      el: el,
      callbacks: callbacks,
      numericRenderers: numericRenderers
    });
    renderNumericFields(el, fieldsNorm);
    wireNumericOverlay(el);
    syncToolbarButtonsFromCallbacks(el, callbacks);
    showOverlay(el);
  }

  function openTextInput(id, text, callbacks) {
    callbacks = mergeCallbacks(defaultBaseCallbacks(), callbacks || {});

    var txt = text === undefined || text === null ? '' : String(text);

    var existing = DS.get(id);
    if (existing && existing.kind === 'textInput') {
      DS.bringToTop(id);
      existing.callbacks = callbacks;
      var ta0 = existing.el.querySelector('.js-input-text');
      if (ta0) {
        ta0.value = txt;
        ta0.focus();
      }
      syncToolbarButtonsFromCallbacks(existing.el, callbacks);
      showOverlay(existing.el);
      return;
    }

    var el = resolveOverlayElement('textInput');
    el.setAttribute('data-dialog-id', id);
    DS.push({ id: id, kind: 'textInput', el: el, callbacks: callbacks });
    var ta = el.querySelector('.js-input-text');
    if (ta) {
      ta.value = txt;
      ta.focus();
    }
    syncToolbarButtonsFromCallbacks(el, callbacks);
    showOverlay(el);
  }

  function unmount(dialogId) {
    var entry = DS.remove(dialogId);
    if (!entry) return;
    var kind = entry.kind;
    var el = entry.el;
    if (kind === 'list') closeListHeaderFloatsFor(el);

    if (el.getAttribute('data-dialog-clone') === '1') {
      if (el.parentNode) el.remove();
    } else {
      hideOverlay(el);
    }
    el.removeAttribute('data-dialog-id');
  }

  function close(dialogId) {
    var entry = DS.get(dialogId);
    if (!entry) return;
    getCb(entry, 'onClose')({ id: dialogId, kind: entry.kind });
    unmount(dialogId);
  }

  function cancelFromUser(dialogId) {
    var entry = DS.get(dialogId);
    if (!entry) return;
    getCb(entry, 'onCancel')({ id: dialogId, kind: entry.kind });
    unmount(dialogId);
  }

  function confirmFromUser(dialogId) {
    var entry = DS.get(dialogId);
    if (!entry) return;
    var kind = entry.kind;
    var el = entry.el;
    var cbs = entry.callbacks || {};

    if (kind === 'msg') {
      var box = el.querySelector('.js-detail-html');
      var titleEl = el.querySelector('.js-detail-title');
      if (typeof cbs.onConfirm === 'function') {
        cbs.onConfirm({
          id: dialogId,
          kind: kind,
          title: titleEl ? titleEl.textContent : '',
          html: box ? box.innerHTML : ''
        });
      }
    } else if (kind === 'numeric') {
      var body = el.querySelector('.js-numeric-fields');
      var values = {};
      if (body) {
        var inps = body.querySelectorAll('.js-input-numeric');
        Array.prototype.forEach.call(inps, function (inp) {
          var fid = inp.getAttribute('data-field-id');
          if (!fid) return;
          var n = parseFloat(String(inp.value), 10);
          if (isNaN(n)) n = 0;
          var part = inp.getAttribute('data-range-part');
          if (part === 'low') {
            if (!values[fid] || typeof values[fid] !== 'object') {
              values[fid] = {};
            }
            values[fid].low = n;
          } else if (part === 'high') {
            if (!values[fid] || typeof values[fid] !== 'object') {
              values[fid] = {};
            }
            values[fid].high = n;
          } else {
            values[fid] = n;
          }
        });
      }
      if (typeof cbs.onConfirm === 'function') {
        var payload = { id: dialogId, kind: kind, values: values };
        if (
          Object.keys(values).length === 1 &&
          Object.prototype.hasOwnProperty.call(values, 'value')
        ) {
          payload.value = String(values.value);
        }
        cbs.onConfirm(payload);
      }
    } else if (kind === 'textInput') {
      var ta = el.querySelector('.js-input-text');
      var t = ta ? ta.value : '';
      if (typeof cbs.onConfirm === 'function') {
        cbs.onConfirm({ id: dialogId, kind: kind, text: t });
      }
    } else {
      if (typeof cbs.onConfirm === 'function') {
        cbs.onConfirm({ id: dialogId, kind: kind });
      }
    }
    unmount(dialogId);
  }

  var globalUiBound = false;
  function bindGlobalUiOnce() {
    if (globalUiBound) return;
    globalUiBound = true;

    document.addEventListener('click', function (e) {
      var tbar = e.target.closest('.js-dialog-toolbar');
      if (tbar) {
        var overlay = tbar.closest('.dialog-overlay[data-dialog-id]');
        if (overlay) {
          var dialogId = overlay.getAttribute('data-dialog-id');
          var entry = getEntry(dialogId);
          if (entry) {
            var which = tbar.getAttribute('data-toolbar');
            var map = {
              left: 'onToolbarLeft',
              right: 'onToolbarRight',
              filter: 'onToolbarFilter',
              config: 'onToolbarConfig'
            };
            var key = map[which];
            var fn = entry.callbacks && key ? entry.callbacks[key] : null;
            if (typeof fn === 'function') {
              fn({ id: dialogId, kind: entry.kind });
            }
          }
        }
        e.stopPropagation();
        return;
      }

      var closeBtn = e.target.closest(
        '.dialog-overlay[data-dialog-id] .btn-icon-header.btn-close'
      );
      if (closeBtn) {
        var overlay = closeBtn.closest('.dialog-overlay[data-dialog-id]');
        if (overlay) {
          var dialogId = overlay.getAttribute('data-dialog-id');
          if (dialogId) close(dialogId);
        }
        return;
      }

      var cancelBtn = e.target.closest(
        '.dialog-overlay[data-dialog-id] .js-dialog-cancel'
      );
      if (cancelBtn) {
        var ov = cancelBtn.closest('.dialog-overlay[data-dialog-id]');
        if (ov) {
          var id2 = ov.getAttribute('data-dialog-id');
          if (id2) cancelFromUser(id2);
        }
        return;
      }

      var okBtn = e.target.closest(
        '.dialog-overlay[data-dialog-id] .js-dialog-ok'
      );
      if (okBtn) {
        var ovv = okBtn.closest('.dialog-overlay[data-dialog-id]');
        if (ovv) {
          var id3 = ovv.getAttribute('data-dialog-id');
          if (id3) confirmFromUser(id3);
        }
      }
    });
  }
  bindGlobalUiOnce();

  window.Dialogs = {
    openList: openList,
    openMsg: openMsg,
    openReport: openReport,
    updateReportChart: updateReportChart,
    openConfig: openConfig,
    openNumeric: openNumeric,
    openTextInput: openTextInput,
    close: close
  };
})();

/**
 * 仅用于本页的演示：绑定列表/弹层入口按钮，与 Dialogs 库解耦。
 * 依赖：dialogDemoData.js、dialogStack.js、dialogs.js（先于本文件加载）
 */
(function () {
  var D = window.DialogDemoData;

  function headerLabel(h) {
    if (!h) return '';
    if (h.header != null) return String(h.header);
    if (h.label != null) return String(h.label);
    return '';
  }

  function wireDialogDemos() {
    if (!window.Dialogs || !D) {
      console.warn('dialogDemo.js：需要 Dialogs 与 DialogDemoData');
      return;
    }

    var btnOpen = document.getElementById('btnOpenList');
    if (btnOpen) {
      btnOpen.addEventListener('click', function () {
        Dialogs.openList('list-main', undefined, undefined, {
          // 标题栏四个工具按钮：传了哪个回调，就出现哪个按钮（关闭 × 始终有）
          onToolbarLeft: function (ev) {
            console.log('[demo] 列表工具栏：向左', ev);
            alert('列表工具栏：向左\nid=' + ev.id + ' kind=' + ev.kind);
          },
          onToolbarRight: function (ev) {
            console.log('[demo] 列表工具栏：向右', ev);
            alert('列表工具栏：向右');
          },
          onToolbarFilter: function (ev) {
            console.log('[demo] 列表工具栏：过滤', ev);
            alert('列表工具栏：过滤');
          },
          onToolbarConfig: function (ev) {
            console.log('[demo] 列表工具栏：配置', ev);
            alert('列表工具栏：配置');
          },
          onRowClick: function (ev) {
            var vals = ev.row && ev.row.values ? ev.row.values : [];
            var headers = D.listHeadersDemo();
            var lines = [];
            for (var i = 0; i < Math.min(vals.length, headers.length); i++) {
              lines.push(headerLabel(headers[i]) + '：' + vals[i]);
            }
            alert('行数据：\n' + lines.join('\n'));
          },
          onHeaderClick: function (ev) {
            // 中间三列：名称、类型、状态（col 1,2,3），与旧版 demo 一致
            if (ev.col >= 1 && ev.col <= 3) {
              alert('表头：「' + ev.header + '」');
            }
          }
        });
      });
    }

    var btnDetailDemo = document.getElementById('btnOpenDetailDemo');
    if (btnDetailDemo) {
      btnDetailDemo.addEventListener('click', function () {
        Dialogs.openMsg('msg-demo', undefined, undefined, {
          onConfirm: function (ev) {
            console.log('[demo] 信息确定', ev);
          }
        });
      });
    }

    var btnReportDemo = document.getElementById('btnOpenReportDemo');
    if (btnReportDemo) {
      btnReportDemo.addEventListener('click', function () {
        Dialogs.openReport(
          'report-demo',
          undefined,
          undefined,
          undefined,
          D.reportXAxisStart,
          D.reportXAxisEnd,
          {
            onReportRowAction: function (ev) {
              console.log('[demo] 报表行', ev.id, ev.row);
            }
          }
        );
      });
    }

    var btnNumericDemo = document.getElementById('btnOpenNumericDemo');
    if (btnNumericDemo) {
      btnNumericDemo.addEventListener('click', function () {
        Dialogs.openNumeric('numeric-demo', D.numericFieldsDemo(), {
          onConfirm: function (ev) {
            console.log('[demo] 数值', ev.values, ev.value);
          }
        });
      });
    }

    var btnTextDemo = document.getElementById('btnOpenTextDemo');
    if (btnTextDemo) {
      btnTextDemo.addEventListener('click', function () {
        Dialogs.openTextInput('text-demo', undefined, {
          onConfirm: function (ev) {
            console.log('[demo] 文本长度', (ev.text || '').length);
          }
        });
      });
    }

    var btnOpenConfig = document.getElementById('btnOpenConfig');
    if (btnOpenConfig) {
      btnOpenConfig.addEventListener('click', function () {
        Dialogs.openConfig('config-main', undefined, {
          onConfigItem: function (ev) {
            console.log('[demo] 配置项', ev.id, ev.item);
          }
        });
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', wireDialogDemos);
  } else {
    wireDialogDemos();
  }
})();


  </script>
